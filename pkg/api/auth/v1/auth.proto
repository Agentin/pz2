syntax = "proto3";

package auth.v1;

// Добавьте эту строку, указав ваш полный Go import path
option go_package = "github.com/student/tech-ip-sem2/pkg/api/auth/v1";

service AuthService {
  rpc Verify(VerifyRequest) returns (VerifyResponse);
}

message VerifyRequest {
  string token = 1;
}

message VerifyResponse {
  bool valid = 1;
  string subject = 2;
}